spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/identity_service
    username: identity_user
    password: identity_pass
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  mail:
    host: localhost
    port: 1025
    protocol: smtp
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}
          jwk-set-uri: ${COGNITO_JWKS_URI}

aws:
  region: us-east-1
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID}
    client-id: ${COGNITO_CLIENT_ID}

app:
  email:
    from: noreply@localhost

logging:
  level:
    root: INFO
    com.sudswastik.identityservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
